{% extends "base.html" %}
{% load static %}

{% block title %}
Private Rooms
{% endblock %}


{% block div_header %}
<h1>Private Chat Rooms</h1>
{% endblock %}


{% block div_content %}
<div class="user-private-rooms">
    {% for r in rooms %}
    <div class="private-room-field">
        <a href="{% url 'chat:user-private-chat-room-join' user_id=user.id url_id=r.url_id %}">Chat of {{  r.user_1  }} and {{  r.user_2  }}</a>
    </div>
    {% endfor %}
</div>

{% endblock %}
