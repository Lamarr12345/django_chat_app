{% extends "base.html" %}
{% load static %}

{% block title %}
Private Rooms
{% endblock %}


{% block div_header %}
<h1>Private Chat Rooms</h1>
{% endblock %}


{% block div_content %}
<div class="user-private-rooms">
    {% for rd in room_data %}
    <div class="private-room-field">
        <a href="{% url 'chat:user-private-chat-room-join' user_id=user.id url_id=rd.room.url_id %}">{{  rd.other_user  }}</a>
    </div>
    {% endfor %}
</div>

{% endblock %}
